<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>מערכת תברואה וסטטוס מסלולים</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-screen" class="screen active">
        <div class="login-box">
            <h2>מערכת ניווט ובקרה</h2>
            <h3>אגף התברואה</h3>
            <div class="input-group">
                <label>אימייל:</label>
                <input type="email" id="username" placeholder="הכנס כתובת אימייל">
            </div>
            <div class="input-group">
                <label>סיסמה:</label>
                <input type="password" id="password" placeholder="******">
            </div>
            <button id="login-btn" class="main-btn">התחבר למערכת</button>
            <p id="login-error" class="error-text"></p>
        </div>
    </div>

    <div id="worker-screen" class="screen">
        <div class="header">
            <h2>שלום, צוות שטח</h2>
            <button class="logout-btn">התנתק</button>
        </div>
        <div class="menu-content">
            <div class="card">
                <h3>משימת המשמרת</h3>
                <label>בחר קו פינוי מוקצה:</label>
                <select id="worker-route-select">
                    <option>קו 12 - פלורנטין בוקר</option>
                    <option>קו 5 - מרכז העיר</option>
                </select>
                <button id="worker-start-nav-btn" class="main-btn success">התחל נסיעה ופתח מפה</button>
            </div>
            <button id="worker-report-btn" class="main-btn danger">⚠️ דווח על מפגע/תקלה ברחוב</button>
        </div>
    </div>

    <div id="manager-screen" class="screen">
        <div class="header">
            <h2>ממשק ניהול ובקרה</h2>
            <button class="logout-btn">התנתק</button>
        </div>
        <div class="menu-content">
            <div class="grid-container">
                <button id="mgr-record-btn" class="grid-btn">➕<br>הקלטת מסלול חדש</button>
                <button id="mgr-nav-btn" class="grid-btn">🗺️<br>ניווט במסלול קיים</button>
            </div>
            <div class="card">
                <h3>חמ"ל דיווחים מהשטח</h3>
                <ul class="report-list">
                    <li>אין דיווחים כרגע.</li>
                </ul>
            </div>
        </div>
    </div>

    <div id="map-screen" class="screen">
        <div id="map-controls">
            <button id="map-back-btn" class="back-btn">⬅️ חזור לתפריט</button>
            <span id="map-action-title">מצב ניווט</span>
        </div>
        <div id="map"></div>
        <div id="status-bar">GPS מחובר...</div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
